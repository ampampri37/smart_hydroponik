<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Smart Hydroponic System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; min-height: 100vh; color: white; overflow-x: hidden; }
        .bg-grid { background-image: linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px); background-size: 40px 40px; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .pump-btn.active { background: #10b981; color: #000; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .tank-water { transition: height 0.5s ease-in-out, y 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-grid">

    <header class="fixed top-0 left-0 right-0 z-50 glass-card border-b border-slate-800/50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center">
                    <i data-lucide="leaf" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold">HydroCore OS <span class="text-xs text-yellow-400">v2.3</span></h1>
                    <p class="text-[10px] text-emerald-500 font-semibold uppercase">Automated Hydroponic</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-slate-900/60 border border-slate-800 rounded-lg px-3 py-1.5">
                    <div id="connDot" class="w-2 h-2 rounded-full bg-red-500 pulse-dot"></div>
                    <span id="connText" class="text-xs font-medium text-slate-400">Connecting...</span>
                </div>
                <div class="flex items-center bg-slate-900 border border-slate-800 rounded-lg p-1">
                    <button id="autoBtn" onclick="setMode('auto')" class="px-3 py-1 text-xs font-semibold rounded-md bg-emerald-600 text-white">AUTO</button>
                    <button id="manualBtn" onclick="setMode('manual')" class="px-3 py-1 text-xs font-semibold rounded-md text-slate-400">MANUAL</button>
                </div>
                <button onclick="openSettings()" class="bg-slate-900 border border-slate-800 w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-white">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                </button>
                
            </div>
        </div>
    </header>

    <main class="pt-24 pb-8 max-w-7xl mx-auto px-4">
        <div class="mb-6 flex flex-wrap items-center gap-4 bg-slate-900/40 border border-slate-800/60 rounded-xl px-5 py-3">
            <div class="flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4 text-emerald-400"></i><span class="text-xs text-slate-400">Mode:</span><span id="systemStatus" class="text-xs font-semibold text-emerald-400">AUTO</span></div>
            <div class="w-px h-4 bg-slate-800"></div>
            <div class="flex items-center gap-2"><i data-lucide="clock" class="w-4 h-4 text-blue-400"></i><span class="text-xs text-slate-400">Time:</span><span id="uptime" class="text-xs font-semibold text-blue-400">--:--</span></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="glass-card rounded-2xl p-6">
                <span class="text-xs font-semibold text-slate-400 uppercase flex items-center gap-1.5 mb-2"><i data-lucide="flask-conical" class="w-4 h-4 text-emerald-400"></i> pH Level</span>
                <div class="flex items-baseline gap-1"><span id="phValue" class="text-5xl font-black">0.0</span></div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full mt-4"><div id="phProgress" class="bg-emerald-500 h-full" style="width: 0%"></div></div>
            </div>
            <div class="glass-card rounded-2xl p-6">
                <span class="text-xs font-semibold text-slate-400 uppercase flex items-center gap-1.5 mb-2"><i data-lucide="droplets" class="w-4 h-4 text-blue-400"></i> Nutrient</span>
                <div class="flex items-baseline gap-1"><span id="tdsValue" class="text-5xl font-black">0</span><span class="text-slate-500">PPM</span></div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full mt-4"><div id="tdsProgress" class="bg-blue-500 h-full" style="width: 0%"></div></div>
            </div>
            <div class="glass-card rounded-2xl p-6">
                <span class="text-xs font-semibold text-slate-400 uppercase flex items-center gap-1.5 mb-2"><i data-lucide="navigation" class="w-4 h-4 text-cyan-400"></i> Water Dist</span>
                <div class="flex items-baseline gap-1"><span id="wlValue" class="text-5xl font-black">0</span><span class="text-slate-500">CM</span></div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full mt-4"><div id="wlProgress" class="bg-cyan-500 h-full" style="width: 0%"></div></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 mb-6">
            <div class="lg:col-span-2 glass-card rounded-2xl p-6">
                <div class="flex justify-between mb-4"><h3 class="font-bold text-sm text-slate-300">TANK</h3><span id="tankPercent" class="text-xl font-bold text-blue-400">0%</span></div>
                <div class="flex justify-center py-4 bg-slate-900/20 rounded-xl">
                    <svg width="200" height="180" viewBox="0 0 200 180">
                        <rect x="25" y="10" width="150" height="150" rx="14" fill="none" stroke="#334155" stroke-width="4"/>
                        <clipPath id="tankMask"><rect x="25" y="10" width="150" height="150" rx="14"/></clipPath>
                        <g clip-path="url(#tankMask)"><rect id="waterFill" class="tank-water" x="25" y="160" width="150" height="0" fill="#3b82f6" opacity="0.8"/></g>
                    </svg>
                </div>
            </div>
            <div class="lg:col-span-3 glass-card rounded-2xl p-6">
                <h3 class="font-bold text-sm text-slate-300 mb-4">ACTUATORS</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900/60 border border-slate-800/80 p-4 rounded-xl">
                        <div class="flex justify-between mb-3"><span class="text-xs text-slate-400">PUMP A</span><div id="pump1Dot" class="w-2 h-2 rounded-full bg-slate-700"></div></div>
                        <button id="act-p1" onclick="toggleManual('p1')" class="pump-btn w-full py-2.5 rounded-lg text-xs font-bold bg-slate-800 text-slate-400">OFF</button>
                    </div>
                    <div class="bg-slate-900/60 border border-slate-800/80 p-4 rounded-xl">
                        <div class="flex justify-between mb-3"><span class="text-xs text-slate-400">PUMP B</span><div id="pump2Dot" class="w-2 h-2 rounded-full bg-slate-700"></div></div>
                        <button id="act-p2" onclick="toggleManual('p2')" class="pump-btn w-full py-2.5 rounded-lg text-xs font-bold bg-slate-800 text-slate-400">OFF</button>
                    </div>
                    <div class="bg-slate-900/60 border border-slate-800/80 p-4 rounded-xl">
                        <div class="flex justify-between mb-3"><span class="text-xs text-slate-400">pH UP</span><div id="pump3Dot" class="w-2 h-2 rounded-full bg-slate-700"></div></div>
                        <button id="act-p3" onclick="toggleManual('p3')" class="pump-btn w-full py-2.5 rounded-lg text-xs font-bold bg-slate-800 text-slate-400">OFF</button>
                    </div>
                    <div class="bg-slate-900/60 border border-slate-800/80 p-4 rounded-xl">
                        <div class="flex justify-between mb-3"><span class="text-xs text-slate-400">pH DOWN</span><div id="pump4Dot" class="w-2 h-2 rounded-full bg-slate-700"></div></div>
                        <button id="act-p4" onclick="toggleManual('p4')" class="pump-btn w-full py-2.5 rounded-lg text-xs font-bold bg-slate-800 text-slate-400">OFF</button>
                    </div>
                    <div class="col-span-2 bg-slate-900/60 border border-slate-800/80 p-4 rounded-xl">
                        <div class="flex justify-between mb-3"><span class="text-xs text-slate-400">SOLENOID VALVE</span><div id="solDot" class="w-2 h-2 rounded-full bg-slate-700"></div></div>
                        <button id="act-sol" onclick="toggleManual('sol')" class="pump-btn w-full py-2.5 rounded-lg text-xs font-bold bg-slate-800 text-slate-400">OFF</button>
                    </div>
                </div>
            </div>
        </div>
        

        <div class="glass-card rounded-2xl p-6 mb-6">
            <h3 class="font-bold text-sm text-slate-300 mb-4">DATA CHART</h3>
            <div class="relative w-full h-64"><canvas id="sensorChart"></canvas></div>
        </div>
    </main>

    <div id="settingsOverlay" class="fixed inset-0 bg-black/70 z-50 hidden opacity-0 transition-opacity duration-300" onclick="closeSettings()"></div>
    <div id="settingsPanel" class="fixed top-0 right-0 w-full sm:w-96 h-full bg-[#0d1527] border-l border-slate-800 z-50 overflow-y-auto translate-x-full transition-transform duration-300 shadow-2xl p-6">
        <div class="flex items-center justify-between mb-6 border-b border-slate-800 pb-4">
            <h2 class="text-base font-bold text-slate-200">SETTINGS</h2>
            <button onclick="closeSettings()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="space-y-4">
            <div><label class="text-xs text-slate-400 block mb-1">Target TDS (PPM)</label><input type="number" id="set-tds" value="800" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-sm text-white"></div>
            <div><label class="text-xs text-slate-400 block mb-1">pH Low Limit</label><input type="number" step="0.1" id="set-ph-low" value="5.5" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-sm text-white"></div>
            <div><label class="text-xs text-slate-400 block mb-1">pH High Limit</label><input type="number" step="0.1" id="set-ph-high" value="6.5" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-sm text-white"></div>
            <div><label class="text-xs text-slate-400 block mb-1">Water Limit (Min Dist)</label><input type="number" id="set-wl-limit" value="10" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-sm text-white"></div>
            <button onclick="sendSettings()" class="w-full mt-4 py-3 bg-emerald-600 rounded-lg text-sm font-bold text-white">SAVE ALL SETTINGS</button>
        </div>
    </div>
        <div class="flex items-center justify-between mb-6 border-b border-slate-800 pb-4">
            <h2 class="text-base font-bold text-slate-200">SETTINGS</h2>
            <button onclick="closeSettings()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="space-y-4">
            <div><label class="text-xs text-slate-400 block mb-1">Target TDS</label><input type="number" id="set-tds" value="800" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-sm text-white"></div>
            <button onclick="sendSettings()" class="w-full mt-4 py-3 bg-emerald-600 rounded-lg text-sm font-bold text-white">SAVE PARAMETERS</button>
        </div>
    </div>

    <script>
    const ctx = document.getElementById('sensorChart').getContext('2d');
    const sensorChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'pH', data: [], borderColor: '#10b981' }, { label: 'TDS', data: [], borderColor: '#3b82f6' }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    let currentMode = "auto";
    let currentRelayStates = { p1: 0, p2: 0, p3: 0, p4: 0, sol: 0 };

    function openSettings() {
        document.getElementById("settingsOverlay").classList.remove("hidden");
        setTimeout(() => document.getElementById("settingsOverlay").classList.remove("opacity-0"), 10);
        document.getElementById("settingsPanel").classList.remove("translate-x-full");
    }
    
    function closeSettings() {
        document.getElementById("settingsOverlay").classList.add("opacity-0");
        document.getElementById("settingsPanel").classList.add("translate-x-full");
        setTimeout(() => document.getElementById("settingsOverlay").classList.add("hidden"), 300);
    }

    const MQTT_HOST = "e8116a8d612b48cfba182a104ceb880a.s1.eu.hivemq.cloud";
    const MQTT_PORT = 8884;
    const CLIENT_ID = "HydroDash_" + Math.random().toString(16).substr(2, 8);
    const client = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, "/mqtt", CLIENT_ID);

    function connectMQTT() {
        client.connect({
            useSSL: true, userName: "hydroponic1", password: "Hydroponic123",
            onSuccess: () => {
                document.getElementById("connDot").className = "w-2 h-2 rounded-full bg-emerald-500 pulse-dot";
                document.getElementById("connText").innerText = "Connected";
                client.subscribe("hydroponik/data");
            },
            onFailure: () => setTimeout(connectMQTT, 3000)
        });
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('systemStatus').textContent = mode.toUpperCase();
        
        const autoBtn = document.getElementById('autoBtn');
        const manualBtn = document.getElementById('manualBtn');
        if(mode === 'auto') {
            autoBtn.className = "px-3 py-1 text-xs font-semibold rounded-md bg-emerald-600 text-white";
            manualBtn.className = "px-3 py-1 text-xs font-semibold rounded-md text-slate-400 bg-transparent";
        } else {
            manualBtn.className = "px-3 py-1 text-xs font-semibold rounded-md bg-slate-600 text-white";
            autoBtn.className = "px-3 py-1 text-xs font-semibold rounded-md text-slate-400 bg-transparent";
        }
        
        let message = new Paho.MQTT.Message(JSON.stringify({ mode: mode }));
        message.destinationName = "hydroponik/command";
        client.send(message);
    }

   function sendSettings() {
        let settings = {
            set_tds: parseInt(document.getElementById('set-tds').value),
            set_ph_low: parseFloat(document.getElementById('set-ph-low').value),
            set_ph_high: parseFloat(document.getElementById('set-ph-high').value),
            set_wl: parseInt(document.getElementById('set-wl-limit').value)
        };
        
        let message = new Paho.MQTT.Message(JSON.stringify(settings));
        message.destinationName = "hydroponik/command";
        client.send(message);
        
        closeSettings();
        alert("Settings Tersimpan & Terkirim ke ESP32!");
    }

    function toggleManual(device) {
        if (currentMode === "auto") {
            alert("Pindahkan ke mode MANUAL terlebih dahulu!");
            return;
        }
        let currentState = currentRelayStates[device] || 0;
        let newState = currentState === 1 ? 0 : 1;
        
        let payload = {};
        payload[device] = newState;
        
        let message = new Paho.MQTT.Message(JSON.stringify(payload));
        message.destinationName = "hydroponik/command";
        client.send(message);
    }

    function updateRelayUI(btnId, dotId, value) {
        const btn = document.getElementById(btnId);
        const dot = document.getElementById(dotId);
        if(!btn || !dot) return;
        if(value == 1) {
            btn.classList.add("active", "bg-emerald-500", "text-black"); btn.innerText = "ON";
            dot.className = "w-2 h-2 rounded-full bg-emerald-400 pulse-dot";
        } else {
            btn.classList.remove("active", "bg-emerald-500", "text-black"); btn.innerText = "OFF";
            dot.className = "w-2 h-2 rounded-full bg-slate-700";
        }
    }

    client.onMessageArrived = (message) => {
        try {
            const data = JSON.parse(message.payloadString);
            
            // Simpan status relay
            if(data.p1 !== undefined) currentRelayStates.p1 = data.p1;
            if(data.p2 !== undefined) currentRelayStates.p2 = data.p2;
            if(data.p3 !== undefined) currentRelayStates.p3 = data.p3;
            if(data.p4 !== undefined) currentRelayStates.p4 = data.p4;
            if(data.sol !== undefined) currentRelayStates.sol = data.sol;

            // Update UI Relay (Hanya update jika ESP32 merespon)
            updateRelayUI("act-p1", "pump1Dot", currentRelayStates.p1);
            updateRelayUI("act-p2", "pump2Dot", currentRelayStates.p2);
            updateRelayUI("act-p3", "pump3Dot", currentRelayStates.p3);
            updateRelayUI("act-p4", "pump4Dot", currentRelayStates.p4);
            updateRelayUI("act-sol", "solDot", currentRelayStates.sol);

            // Anti NaN Logic
            let phVal = parseFloat(data.ph);
            if(isNaN(phVal)) phVal = 0;
            
            let tdsVal = parseInt(data.tds);
            if(isNaN(tdsVal)) tdsVal = 0;
            
            let wlVal = parseFloat(data.wl);
            if(isNaN(wlVal)) wlVal = 0;

            document.getElementById("phValue").innerText = phVal.toFixed(1);
            document.getElementById("tdsValue").innerText = tdsVal;
            document.getElementById("wlValue").innerText = wlVal.toFixed(0);

            // Update Tank Visual (Anggap jarak sensor ke air 30cm)
            let tankPercent = Math.max(0, Math.min(100, ((30 - wlVal) / 30) * 100));
            document.getElementById("tankPercent").innerText = Math.round(tankPercent) + "%";
            document.getElementById("waterFill").setAttribute("height", tankPercent * 1.5);
            document.getElementById("waterFill").setAttribute("y", 160 - (tankPercent * 1.5));

            // Update Waktu & Chart
            const timeStr = new Date().toLocaleTimeString();
            document.getElementById("uptime").innerText = timeStr;
            if (!sensorChart.data.labels.includes(timeStr)) {
                sensorChart.data.labels.push(timeStr);
                sensorChart.data.datasets[0].data.push(phVal);
                sensorChart.data.datasets[1].data.push(tdsVal);
                if (sensorChart.data.labels.length > 10) {
                    sensorChart.data.labels.shift();
                    sensorChart.data.datasets[0].data.shift();
                    sensorChart.data.datasets[1].data.shift();
                }
                sensorChart.update();
            }

        } catch (e) {
            console.error("Parse Error:", e);
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        connectMQTT();
    });
    </script>
</body>
</html>
